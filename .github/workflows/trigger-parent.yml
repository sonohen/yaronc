name: Trigger Parent Deploy

on:
  push:
    branches:
      - master

jobs:
  trigger-parent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger parent repository workflow
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.YARONC }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/sonohen/sonohen.github.io/actions/workflows/hugo.yml/dispatches \
            -d '{"ref":"master"}'
